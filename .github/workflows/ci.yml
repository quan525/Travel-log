name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: test
      TURSO_DATABASE_URL: file:local.db
      BETTER_AUTH_SECRET: github-actions-only-secret-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000
      GITHUB_CLIENT_ID: github-actions-client-id
      GITHUB_CLIENT_SECRET: github-actions-client-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
