name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CI: true
      TURSO_DATABASE_URL: file:local.db
      TURSO_AUTH_TOKEN: ${{ secrets.GITHUB_CLIENT_SECRET }}
      BETTER_AUTH_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.GITHUB_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_SECRET }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      APP_PRODUCTION_URL: ${{ secrets.APP_PRODUCTION_URL }}
      OAUTH_PROXY_SECRET: ${{ secrets.OAUTH_PROXY_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
